<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css" />
    <link rel="stylesheet" href="/estilos/media-query.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section id="login">
        <div id="imagem"></div>
        <div id="formulario">
          <h1>Login</h1>
          <p>
            Seja bem-vindo(a) novamente. Faça <br />
            login para acessar sua conta e poder <br />
            fazer as configurações no seu ambiente.
          </p>
          <form action="login.php" method="post" autocomplete="on">
            <label for="nemail">
              <div id="email">
                <span id="user" class="material-symbols-outlined">
                  account_circle
                </span>

                <input
                  type="email"
                  name="nemail"
                  id="iemail"
                  placeholder="seu e-mail"
                  required
                />
              </div>
            </label>
            <label for="nsenha">
              <div id="senha">
                <span id="senha" class="material-symbols-outlined">
                  vpn_key
                </span>
                <input
                  type="password"
                  name="nsenha"
                  id="isenha"
                  placeholder="sua senha"
                  required
                />
              </div>
            </label>
            <input id="bentrar" type="submit" value="Entrar" />
            <a id="besqueci" href="www.google.com">Esqueci a senha</a>
          </form>
        </div>
      </section>
    </main>
  </body>
  <script src="responsividade/script.js"></script>
</html>
